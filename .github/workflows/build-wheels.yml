name: Build Wheels

"on":
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 9 1 * *"
  workflow_dispatch:
    inputs:
      target:
        description: "Platform wheels to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
          - publish_existing
      source_run_ids:
        description: "For target=publish_existing: comma or whitespace separated run IDs containing wheel and sdist artifacts"
        required: false
        type: string

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: manylinux-x86_64
            cibw_arch: x86_64
            target: linux
          - os: windows-latest
            artifact: windows-amd64
            cibw_arch: AMD64
            target: windows
          - os: macos-15
            artifact: macos-arm64
            cibw_arch: arm64
            target: macos
          - os: macos-15-intel
            artifact: macos-x86_64
            cibw_arch: x86_64
            target: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache vcpkg artifacts (Windows)
        if: >-
          matrix.os == 'windows-latest' &&
          (github.event_name != 'workflow_dispatch' ||
          github.event.inputs.target == 'all' ||
          github.event.inputs.target == matrix.target)
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\downloads
            C:\vcpkg\buildtrees
            C:\vcpkg\packages
            C:\vcpkg\installed
            C:\vcpkg\bincache
          key: ${{ runner.os }}-vcpkg-parosol-v1-${{ hashFiles('pyproject.toml', '.github/workflows/build-wheels.yml') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-parosol-v1-

      - name: Install cibuildwheel
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.target == 'all' ||
          github.event.inputs.target == matrix.target
        run: |
          python -m pip install --upgrade pip "cibuildwheel>=3"

      - name: Build wheels (cibuildwheel)
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.target == 'all' ||
          github.event.inputs.target == matrix.target
        env:
          CIBW_ARCHS: ${{ matrix.cibw_arch }}
        run: python -m cibuildwheel --output-dir dist

      - name: Upload wheel artifacts
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.target == 'all' ||
          github.event.inputs.target == matrix.target
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.artifact }}
          path: ./dist/*.whl

  build_sdist:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist --outdir dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  publish:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.target == 'publish_existing')
    permissions:
      id-token: write
      contents: write
      actions: read
    environment:
      name: pypi
      url: https://pypi.org/p/parosol-py
    steps:
      - name: Download wheel artifacts
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.target != 'publish_existing'
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.target != 'publish_existing'
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Download artifacts from source runs
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'publish_existing'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_RUN_IDS: ${{ inputs.source_run_ids }}
        run: |
          set -euo pipefail
          if [[ -z "${SOURCE_RUN_IDS//[[:space:],;]/}" ]]; then
            echo "source_run_ids is required when target=publish_existing" >&2
            exit 1
          fi
          mkdir -p dist artifact-zips
          normalized_ids="$(printf '%s\n' "${SOURCE_RUN_IDS}" | tr ',;' '  ')"
          for run_id in ${normalized_ids}; do
            echo "Inspecting artifacts from run ${run_id}"
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts" --paginate \
              --jq '.artifacts[] | select(.expired == false and (.name == "sdist" or (.name | startswith("wheels-")))) | [.id, .name] | @tsv' \
              > "artifact-zips/${run_id}.tsv"
            if [[ ! -s "artifact-zips/${run_id}.tsv" ]]; then
              echo "No active wheel/sdist artifacts found for run ${run_id}" >&2
              exit 1
            fi
            while IFS=$'\t' read -r artifact_id artifact_name; do
              zip_path="artifact-zips/${run_id}-${artifact_name}.zip"
              echo "Downloading ${artifact_name} (${artifact_id})"
              gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" > "${zip_path}"
              unzip -o "${zip_path}" -d dist
            done < "artifact-zips/${run_id}.tsv"
          done

      - name: Set up Python for debug tooling
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Debug artifact inventory
        run: |
          echo "Current dist/ contents:"
          ls -lah dist
          echo
          echo "Wheel files:"
          ls -1 dist/*.whl || true
          echo
          echo "Source distributions:"
          ls -1 dist/*.tar.gz || true

      - name: Twine check
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Upload wheels to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
