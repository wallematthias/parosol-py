# Standard XtremeCTI binary bone compression profile.
input:
  image_type: material_labels

materials:
  units: MPa
  definitions:
    CorticalBone:
      Type: LinearIsotropic
      E: 6829
      nu: 0.3
    TrabecularBone:
      Type: LinearIsotropic
      E: 6829
      nu: 0.3
  table:
    100: TrabecularBone
    127: CorticalBone

load_case:
  type: constrained_axial
  axis: z
  strain: -0.01

solver:
  outputs: [sed]

postprocess:
  pistoia:
    criterion: pistoia
    critical_strain: 0.007
    critical_volume_percent: 2.0
