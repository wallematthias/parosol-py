# Six-case load-history batch: compression, two shears, two bendings, torsion.
# The SED fields from these cases can be combined by a downstream NNLS
# load-history estimator.
batch:
  name: load_history_6
  summary: load_history_6/result.json
  cases:
    - name_suffix: compression_z
      load_case: {type: constrained_axial, axis: z, strain: -0.01}
    - name_suffix: shear_zx
      load_case: {type: shear, axis: z, direction: x, strain: -0.01}
    - name_suffix: shear_zy
      load_case: {type: shear, axis: z, direction: y, strain: -0.01}
    - name_suffix: bending_x
      load_case:
        type: bending
        axis: z
        bending_angle_degrees: -1
        neutral_axis_angle_degrees: 90
        center: center_of_mass
    - name_suffix: bending_y
      load_case:
        type: bending
        axis: z
        bending_angle_degrees: -1
        neutral_axis_angle_degrees: 0
        center: center_of_mass
    - name_suffix: torsion_z
      load_case:
        type: torsion
        axis: z
        twist_angle_degrees: -1
        center: center_of_mass

solver:
  outputs: [sed]

output:
  fields: [sed]
  export_fields: true

postprocess:
  load_history:
    enabled: true
    method: nnls
    fields: [sed]
    cases: [compression_z, shear_zx, shear_zy, bending_x, bending_y, torsion_z]
    summary: load_history_6/load_history_summary.json
    output: load_history_6/load_history.nii.gz
