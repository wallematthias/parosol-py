model:
  type: proximal_femur
  density_image: density.nii.gz
  mask_image: segmentation.nii.gz
  side: left
  labels:
    femur: 2
  geometry:
    cap_axis: y
    isotropic_spacing: 1.0
    spacing_tolerance_mm: 0.001
    cap:
      target_label: 2
      shape: anatomy
      thickness_mm: 3
      intrusion_depth_mm: 6
      method: projected_cap
  outputs:
    material_image: parosol_run/proximal_femur/model/material.nii.gz
    nodeset_image: parosol_run/proximal_femur/model/nodesets.nii.gz
    manifest: parosol_run/proximal_femur/model/model.json
    qc_image: parosol_run/proximal_femur/model/qc.png

materials:
  units: MPa
  density:
    E:
      equation: linear
      slope: 10.0
      intercept: 0.0
    nu: 0.3
    active_threshold: 0.0
  pmma:
    E: 2500
    nu: 0.3

load_case:
  type: sideways_fall
  displacement: 1.0

preprocessing:
  largest_cc: true
  smooth:
    enabled: true
    sigma_mm: 1.0
    density: true
    labels: true
    label_threshold: 0.5
  crop_to_bb:
    enabled: true
    margin_voxels: 8

solver:
  outputs: [sed]

postprocess:
  pistoia:
    criterion: pistoia
    critical_strain: 0.007
    critical_volume_percent: 2.0
  fields:
    mask_to_segmentation: true
    restore_original_grid: false

output:
  result: parosol_run/proximal_femur/result.json
  run_summary: parosol_run/proximal_femur/summary.json
  fields: [sed]
  export_fields: true
  fields_dir: parosol_run/proximal_femur/fields
  visualization: parosol_run/proximal_femur/overview.png
