model:
  type: spine_compression
  density_image: density.nii.gz
  mask_image: segmentation.nii.gz
  labels:
    body: 2
    process: 1
  geometry:
    axis: z
    isotropic_spacing: 1.0
    spacing_tolerance_mm: 0.001
    disk:
      target_label: body
      shape: anatomy
      thickness_mm: 3
      intrusion_depth_mm: 3
      method: projected_cap
  registration:
    enabled: true
    method: vtk_icp
    reference_axis_order: xyz
    reference_flips: [false, false, false]
    initialization: centroid
    convergence: delta
    distance_mode: mean
    max_points: 8000
    iterations: 50
    margin_voxels: 8
  outputs:
    material_image: parosol_run/spine-batch/model/material.nii.gz
    nodeset_image: parosol_run/spine-batch/model/nodesets.nii.gz
    manifest: parosol_run/spine-batch/model/model.json
    qc_image: parosol_run/spine-batch/model/qc.png

materials:
  units: MPa
  density:
    E:
      equation: linear
      slope: 10.0
      intercept: 0.0
    nu: 0.3
    active_threshold: 0.0
  pmma:
    E: 2500
    nu: 0.3

load_case:
  type: spine_compression
  axis: z
  target_displacement_percent: -0.68

preprocessing:
  largest_cc: true
  smooth:
    enabled: true
    sigma_mm: 1.0
    density: true
    labels: true
    label_threshold: 0.5
  crop_to_bb:
    enabled: true
    margin_voxels: 8

solver:
  outputs: [sed, effective_strain, strain]

postprocess:
  pistoia:
    criterion: pistoia
    critical_strain: 0.007
    critical_volume_percent: 2.0
  failure_load:
    linear_deformation: 0.002
    crawford_coefficient: 0.0068
  fields:
    mask_to_segmentation: true
    restore_original_grid: false

output:
  result: parosol_run/spine-batch/result.json
  run_summary: parosol_run/spine-batch/summary.json
  fields: [sed, effective_strain]
  export_fields: true
  fields_dir: parosol_run/spine-batch/fields
  visualization: parosol_run/spine-batch/overview.png
