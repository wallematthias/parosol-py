# parosol-py default case settings.
# Copy this file, set paths, and keep only the sections you need.
# Reusable recipes live in parosol_py/workflows as .parosol-workflow/.parosol-profile assets.

case:
  name: example_case
  work_dir: parosol_run/example_case

input:
  # Material label images are the recommended user-facing input.
  # Supported formats: .AIM, .nii, .nii.gz, .mha, .mhd, .npy, .npz.
  image: material_labels.AIM
  image_type: material_labels
  # For continuous density input, use image_type: density and configure
  # materials.density below.
  # Use auto for formats with metadata. For .npy, provide [x, y, z] spacing in mm.
  spacing: auto
  origin: auto

materials:
  # Label images use a compact ParOSol-py material map. Material-specific nu
  # values are preserved and written as an optional native per-element Poisson
  # ratio image.
  units: MPa
  labels:
    100:
      name: trabecular_bone
      E: 8748
      nu: 0.3
    127:
      name: cortical_bone
      E: 8748
      nu: 0.3
    # Generated disks/caps/connectors are part of the solved model by default.
    # Percent displacements, stiffness, and Pistoia analysis use the full active
    # model unless an explicit input.mask is supplied for field visualization.
    # 201:
    #   name: Top_disk
    #   E: 3000
    #   nu: 0.3
  # Existing legacy-style MaterialDefinitions/MaterialTable files can still be
  # loaded when needed:
  # file: material_cort_trab.yaml
  # Use a scalar override to intentionally force one Poisson ratio for all
  # labels, even if label entries contain different nu values.
  # nu: 0.3
  #
  # Continuous density-to-E mapping. E is produced in MPa.
  # Supported equations include power, linear, polynomial, and mulder2007.
  # mulder2007 expects BMD in mg HA/cm^3 and uses E = 25*density - 5830 MPa.
  # floor_e_mpa applies inside the active material region only.
  # density:
  #   E:
  #     equation: power
  #     coefficient: 10000
  #     exponent: 1.7
  #     reference_density: 1000
  #     floor_e_mpa: 0
  #   nu: 0.3
  #   active_threshold: 0

preprocessing:
  # Keep only the largest non-zero connected component before modelling/solving.
  # Useful for segmented bone images with small disconnected islands.
  largest_cc: false
  # Solve on a foreground bounding box for speed. Postprocessing can restore
  # exported fields to the source image grid for direct visual checking.
  crop_to_bb:
    enabled: false
    margin_voxels: 4
  # Crop the foreground mask to a target bounding-box ratio before registration
  # or solve setup. Example: [1, 1.2, null] preserves the first/reference bbox
  # dimension, crops the second dimension to 1.2x the first, and leaves the
  # third dimension unchanged.
  # bbox_ratio: [1, 1.2, null]
  # Optional crop anchor in the same recipe order. "min" removes the low-index
  # end of that dimension, "max" removes the high-index end, and null/center
  # crops around the bbox center.
  # bbox_crop_from: [null, max, null]
  # Optional downsampled solve. This changes the solve grid and scales spacing.
  # Use for exploratory coarse passes before full-resolution batches.
  # coarsen:
  #   factor: 2
  #   reducer: mean

nodesets:
  # Optional. Use for non-standard loading/fixation regions.
  # Label images are voxel/element labelmaps with the same grid as the material image.
  # selection options:
  #   surface_nodes: nodes on the exterior of the labeled voxel region
  #   all_corner_nodes: every node touched by the labeled voxels
  #   interface_nodes: nodes where labeled voxels touch other material voxels
  #   outer_face_nodes: load-facing face nodes for plane-driven material disks
  load_plate:
    type: label_image
    image: nodesets.nii.gz
    label: 1
    selection: surface_nodes
  distal_fix:
    type: label_image
    image: nodesets.nii.gz
    label: 2
    selection: surface_nodes

load_case:
  # Built-in plate compression. This fixes bottom nodes and applies axial
  # displacement on the top plate while restraining top lateral motion.
  type: constrained_axial
  axis: z
  strain: -0.01
  # For irregular anatomy, visible/smart surfaces follow the first material
  # encountered along the load axis instead of requiring flat image bounds.
  # surface:
  #   mode: smart
  #   depth: auto
  # Use displacement instead of strain when you want an absolute top-plate
  # displacement in image length units.
  # displacement: -0.06
  # Percent values in nodeset/custom load cases, for example value: -1%, use
  # the full solved model dimensions, including generated disks/caps.

  # Other built-in load case examples:
  # type: uniaxial
  # axis: z
  # strain: -0.01
  #
  # type: confined
  # axis: z
  # strain: -0.01
  #
  # type: shear
  # axis: z
  # direction: x
  # strain: -0.01
  # Use direction: y for the paired z-normal shear case.
  # Use shear_vector for two-component z-normal directional shear.
  # shear_vector: [-0.01, 0.0]
  #
  # type: body_weight
  # axis: z
  # force_n: -700
  #
  # type: torsion
  # axis: z
  # twist_angle_degrees: -1
  # center: center_of_mass
  #
  # type: bending
  # axis: z
  # bending_angle_degrees: -1
  # neutral_axis_angle_degrees: 90
  # center: center_of_mass

  # Custom nodeset-driven loading. Change type to nodeset to use this block.
  # type: nodeset
  # fixed:
  #   - nodeset: distal_fix
  #     dofs: [x, y, z]
  #     value: 0
  # prescribed:
  #   - nodeset: load_plate
  #     dof: z
  #     value: -1%
  # loaded:
  #   - nodeset: load_plate
  #     dof: z
  #     value: -700
  #     distribute: true

modeling:
  # Optional anatomy/model generation helpers used before solving.
  # Workflow profiles such as spine-compression and hip-sideways-fall-left define concrete model blocks.
  # Disk/cap generation is intentionally generic: choose the target mask, set
  # external thickness, and set how far the projected footprint may intrude into
  # the target anatomy.
  # disk:
  #   target_label: 20
  #   shape: anatomy  # anatomy, rectangle, square, round, or hex
  #   thickness_mm: 3
  #   intrusion_depth_mm: 6
  #   method: projected_cap

solver:
  tolerance: 1.0e-6
  level: 6
  mpi_processes: 4
  mpi_launcher: mpirun
  # Stream native solver output to the terminal while also saving logs.
  stream_output: true
  # Output field names map to native ParOSol output flags.
  outputs: [sed]
  # Optional summary checks.
  # max_relative_residual: 1.0e-6
  # max_iterations: 10000

postprocess:
  # Pistoia-style failure estimate derived from the solved strain/SED fields.
  pistoia:
    criterion: pistoia
    critical_strain: 0.007
    critical_volume_percent: 2.0
  # Linear vertebral strength estimates derived from stiffness and bone height.
  # linear_deformation is the cohort-calibrated deformation threshold, e.g. 0.002
  # for 0.2%. crawford_coefficient implements F.Load = c * k_fe * h.
  # failure_load:
  #   linear_deformation: 0.002
  #   crawford_coefficient: 0.0068
  # Load-history post-processing combines SED fields from a solved batch.
  # The load_history_3 and load_history_6 profiles provide ready-made batches.
  # load_history:
  #   enabled: false
  #   method: nnls
  #   fields: [sed]
  #   bone_mask: bone_mask.nii.gz
  #   summary: parosol_run/example_case/load_history_summary.json
  #   output: parosol_run/example_case/load_history.nii.gz
  fields:
    # If input.mask/input.segmentation is provided, limit exported strain-like
    # fields to that mask for visualization. Without an explicit mask, fields
    # are exported for the full solved model.
    mask_to_segmentation: true
    # For crop_to_bb preprocessing, paste image fields back into the original
    # image grid when the run did not also change orientation/registration.
    restore_original_grid: true

output:
  # result.json is the compact report-ready file most users should open first.
  # For capped models it reports the stiffness of the solved model, including
  # generated disks/caps.
  result: parosol_run/example_case/result.json
  # summary.json keeps the fuller run record and diagnostics.
  run_summary: parosol_run/example_case/summary.json
  # Fields to export as image volumes. These also become solver outputs unless
  # solver.outputs is set explicitly.
  fields: [sed]
  export_fields: true
  fields_dir: parosol_run/example_case/fields
  # Write a PNG overview for every config-driven run. It shows material slices,
  # the selected result field when available, and boundary-condition overlays.
  visualize: true
  visualization: parosol_run/example_case/example_case_overview.png
  visualization_field: sed
  # Export selected node sets and material element sets for Slicer/ParaView.
  export_sets: false
  set_formats: [json]
  sets_dir: parosol_run/example_case/sets
  export_boundary_conditions: false
  boundary_conditions: parosol_run/example_case/boundary_conditions.json
  dry_run: false
